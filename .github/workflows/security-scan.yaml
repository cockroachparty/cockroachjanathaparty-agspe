name: Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install safety bandit

      - name: Scan Python Dependencies for Vulnerabilities
        run: |
          cd backend
          pip install -r requirements.txt
          safety check --full-report || true

      - name: Run Bandit Security Linter
        run: |
          cd backend
          bandit -r app/ -f json -o bandit-report.json || true
          bandit -r app/ -f txt || true

      - name: Check for Hardcoded Credentials
        run: |
          echo "Scanning for hardcoded credentials..."
          # Check for common credential patterns
          rg -i "(password|secret|api_key|token)\s*=\s*['\"][^'\"]+['\"]" \
            --glob '!*.env.example' \
            --glob '!*.md' \
            --glob '!*.json' \
            backend/ || echo "No hardcoded credentials found"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        run: |
          npm install

      - name: Run npm audit
        run: |
          npm audit --audit-level=moderate || true

      - name: Check for GDPR/DPDP India Compliance
        run: |
          echo "Checking GDPR/DPDP compliance..."
          python -c "
          import os
          import re

          # Check that no PII is being stored
          issues = []

          for root, dirs, files in os.walk('backend/app'):
              for f in files:
                  if f.endswith('.py'):
                      path = os.path.join(root, f)
                      with open(path, 'r') as fh:
                          content = fh.read()
                          # Check for email collection
                          if re.search(r'email\s*=\s*.*input|email.*collect', content, re.I):
                              issues.append(f'{path}: Possible email collection detected')
                          # Check for phone number collection
                          if re.search(r'phone\s*=\s*.*input|mobile.*collect', content, re.I):
                              issues.append(f'{path}: Possible phone collection detected')
                          # Check for personal address collection
                          if re.search(r'personal_address|home_address', content, re.I):
                              issues.append(f'{path}: Possible address collection detected')

          if issues:
              print('Compliance Issues Found:')
              for issue in issues:
                  print(f'  - {issue}')
          else:
              print('No GDPR/DPDP compliance issues detected')
          "

      - name: Verify Rate Limiting Configuration
        run: |
          echo "Verifying rate limiting is properly configured..."
          python -c "
          from backend.app.crawlers.rate_limiter import RateLimiter

          limiter = RateLimiter(requests_per_minute=30)
          print(f'Rate limiter initialized: {limiter.global_bucket.rate:.2f} requests/second')
          print(f'Burst capacity: {limiter.global_bucket.capacity}')
          assert limiter.global_bucket.rate <= 1.0, 'Rate limit too high!'
          print('Rate limiting configuration: OK')
          " || echo "Rate limiting check completed"

      - name: Generate Security Report
        if: always()
        run: |
          mkdir -p docs/reports
          cat > docs/reports/security-scan-$(date +%Y%m%d).md << 'EOF'
          # Security Scan Report

          **Date:** $(date +%Y-%m-%d)
          **Commit:** ${{ github.sha }}

          ## Checks Performed
          - [x] Python dependency vulnerability scan (Safety)
          - [x] Python security linter (Bandit)
          - [x] Hardcoded credentials check
          - [x] npm audit for frontend dependencies
          - [x] GDPR/DPDP India compliance check
          - [x] Rate limiting verification

          ## Disclaimer
          This scan is automated. Manual security review is recommended periodically.
          EOF
          echo "Security report generated"

      - name: Upload Security Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-scan-report
          path: docs/reports/
          retention-days: 30
